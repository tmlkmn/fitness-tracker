<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#171717"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  <!-- Dumbbell icon - custom design -->
  <g transform="translate(256,256)">
    <!-- Bar -->
    <rect x="-110" y="-12" width="220" height="24" rx="12" fill="url(#accent)"/>
    <!-- Left weight plates -->
    <rect x="-155" y="-50" width="36" height="100" rx="10" fill="url(#accent)"/>
    <rect x="-175" y="-38" width="16" height="76" rx="8" fill="url(#accent)" opacity="0.7"/>
    <!-- Right weight plates -->
    <rect x="119" y="-50" width="36" height="100" rx="10" fill="url(#accent)"/>
    <rect x="159" y="-38" width="16" height="76" rx="8" fill="url(#accent)" opacity="0.7"/>
    <!-- Subtle glow effect -->
    <rect x="-110" y="-12" width="220" height="24" rx="12" fill="#4ade80" opacity="0.15"/>
  </g>
  <!-- "FT" text beneath -->
  <text x="256" y="355" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="72" fill="#4ade80" letter-spacing="8" opacity="0.9">FM</text>
</svg>
